
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Time Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    p { font-size: 0.95rem; line-height: 1.4; }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
    }
    input { background: #020617; color: #e5e7eb; border: 1px solid #1e293b; }
    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:disabled { background: #334155; cursor: not-allowed; }
    .box {
      margin-top: 16px;
      padding: 30px;
      text-align: center;
      border-radius: 12px;
      background: #020617;
      border: 2px dashed #1e293b;
      user-select: none;
    }
    .green { background: #16a34a; color: #020617; font-weight: bold; }
    .results { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reaction Time Test</h1>
    <p>Enter your age. When the box turns green, click as fast as possible. You will do this <b>3 times</b>.</p>

    <input id="ageInput" type="number" min="1" max="120" placeholder="Your age" />
    <button id="startBtn">Start test</button>

    <div id="testBox" class="box">Wait…</div>
    <div id="results" class="results"></div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const box = document.getElementById('testBox');
    const resultsDiv = document.getElementById('results');
    const ageInput = document.getElementById('ageInput');

    let trial = 0;
    let times = [];
    let startTime = 0;
    let waiting = false;

    function ageGroup(age) {
      if (age < 10) return 'Under 10';
      if (age < 15) return '10–14';
      if (age < 20) return '15–19';
      if (age < 30) return '20–29';
      if (age < 40) return '30–39';
      if (age < 50) return '40–49';
      if (age < 60) return '50–59';
      return '60+';
    }


    function startRound() {
      box.className = 'box';
      box.textContent = 'Wait…';
      waiting = true;
      const delay = Math.random() * 3000 + 2000;
      setTimeout(() => {
        waiting = false;
        box.classList.add('green');
        box.textContent = 'CLICK!';
        startTime = performance.now();
      }, delay);
    }

    box.addEventListener('click', () => {
      if (trial === 0) return;
      if (waiting) {
        box.textContent = 'Too early!';
        startRound();
        return;
      }

      const reaction = Math.round(performance.now() - startTime);
      times.push(reaction);
      trial++;

      if (trial <= 3) {
        box.textContent = `Time ${trial}: ${reaction} ms`;
        setTimeout(startRound, 800);
      }

      if (trial > 3) {
        const avg = Math.round(times.reduce((a,b)=>a+b,0)/times.length);
        const age = Number(ageInput.value);
        const group = ageGroup(age);


        box.className = 'box';
        box.textContent = 'Finished ✅';
        resultsDiv.innerHTML = `
          <p><b>Age:</b> ${age}</p>
          <p><b>Age group:</b> ${group}</p>
          <p><b>Average:</b> ${avg} ms</p>
          <p><b>✅ Result sent</b></p>
        `;

        const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLScKZ3o_cXF41pHV_lmPNqsROZ8AhTp_ZXT9UUoX-S0zG1Nkfw/formResponse';
        const AGE_ENTRY = 'entry.186633958';
        const AVG_ENTRY = 'entry.211123322';
        const GROUP_ENTRY = 'entry.267395275'; // replace with real entry for age group


        const form = document.createElement('form');
        form.action = FORM_ACTION;
        form.method = 'POST';
        form.target = 'hidden_iframe';

        [[AGE_ENTRY, age],[AVG_ENTRY, avg],[GROUP_ENTRY, group]].forEach(([n,v])=>{
          const i=document.createElement('input');i.name=n;i.value=v;form.appendChild(i);
        });
        document.body.appendChild(form);
        form.submit();
      }
    });

    startBtn.addEventListener('click', () => {
      const age = Number(ageInput.value);
      if (!age || age < 1 || age > 120) {
        alert('Enter valid age'); return;
      }
      startBtn.disabled = true;
      ageInput.disabled = true;
      trial = 1;
      times = [];
      resultsDiv.innerHTML = '';
      startRound();
    });
  </script>
  <iframe name="hidden_iframe" style="display:none"></iframe>
</body>
