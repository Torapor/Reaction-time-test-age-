
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reaction Time Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      padding: 28px;
      border-radius: 18px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      text-align: center;
    }
    input, button {
      width: 100%; padding: 12px; margin-top: 12px;
      border-radius: 10px; border: none; font-size: 1rem;
    }
    input { background:#020617; color:#e5e7eb; border:1px solid #1e293b; }
    button { background:#2563eb; color:white; cursor:pointer; }
    button:disabled { background:#334155; cursor:not-allowed; }

    .zone {
      margin-top: 20px; height: 160px; border-radius: 14px;
      background: #334155; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem; font-weight: bold;
      user-select: none; transition: background .2s;
    }
    .zone.green { background:#22c55e; color:#020617; }
    .zone.locked { pointer-events:none; opacity:0.7; }
    .msg { margin-top: 14px; }
  </style>
</head>
<body>
<div class="card">
<h1>Reaction Time Test</h1>
<p><b>One attempt only.</b> Click when green. Early click = fail.</p>
<input id="age" type="number" min="1" max="120" placeholder="Age" />
<button id="start">Start</button>
<div id="zone" class="zone locked">WAIT</div>
<div id="msg" class="msg"></div>
</div>
<script>
const startBtn = document.getElementById('start');
const zone = document.getElementById('zone');
const msg = document.getElementById('msg');
const ageInput = document.getElementById('age');

let used = localStorage.getItem('reaction_used');
let times = [];
let round = 0;
let waiting = false;
let submitted = false;
let startTime = 0;

if (used) {
  msg.textContent = '❌ Test already completed.';
  startBtn.disabled = true;
  zone.classList.add('locked');
}

function runRound() {
  zone.className = 'zone';
  zone.textContent = 'WAIT';
  waiting = true;
  setTimeout(()=>{
    waiting = false;
    zone.classList.add('green');
    zone.textContent = 'CLICK';
    startTime = performance.now();
  },3000);
}

zone.onclick = ()=>{
  if (submitted || round===0) return;

  if (waiting) {
    zone.textContent='FAILED';
    msg.textContent='❌ Too early.';
    lock(); return;
  }

  const rt = Math.round(performance.now()-startTime);
  times.push(rt); round++;

  if (round < 3) {
    zone.textContent = rt+' ms';
    setTimeout(runRound,1000);
  } else {
    finish();
  }
}

function lock(){
  submitted = true;
  localStorage.setItem('reaction_used','yes');
  zone.classList.add('locked');
}

function finish(){
  const avg=Math.round(times.reduce((a,b)=>a+b,0)/3);
  zone.textContent='DONE ✅';
  msg.innerHTML=`✅ Average: <b>${avg} ms</b>`;
  lock();

  const form=document.createElement('form');
  form.action='https://docs.google.com/forms/d/e/1FAIpQLScKZ3o_cXF41pHV_lmPNqsROZ8AhTp_ZXT9UUoX-S0zG1Nkfw/formResponse';
  form.method='POST'; form.target='hidden';

  [['entry.211123322',ageInput.value],['entry.186633958',avg]]
    .forEach(([n,v])=>{let i=document.createElement('input');i.name=n;i.value=v;form.appendChild(i);});

  document.body.appendChild(form); form.submit();
}

startBtn.onclick=()=>{
  const age=+ageInput.value;
  if(!age||age<1||age>120)return alert('Enter valid age');
  startBtn.disabled=true; ageInput.disabled=true;
  round=1; runRound();
}
</script>
<iframe name="hidden" style="display:none"></iframe>
</body>
</html>
